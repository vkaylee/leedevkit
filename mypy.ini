[mypy]

# Audit scripts are loaded dynamically from skill directories during tests.
# Their import roots are injected at runtime and are not regular Python packages.
[mypy-security_scan]
ignore_missing_imports = True

[mypy-ux_audit]
ignore_missing_imports = True

[mypy-checkers.*]
ignore_missing_imports = True

[mypy-mobile_audit]
ignore_missing_imports = True

[mypy-mobile_checkers.*]
ignore_missing_imports = True
